<!DOCTYPE html>
<!-- SALVAR COMO: index.html — abre com duplo clique, sem dependências de compilação -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Simulador de Lajes Treliçadas — NBR 6118</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e2e2e2;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.wrap{padding:1.5rem 1rem;max-width:760px;margin:0 auto}
input,select{background:#1a1a1a;border:.5px solid #333;border-radius:8px;padding:8px 12px;color:#e2e2e2;font-size:14px;outline:none;width:100%}
input:focus,select:focus{border-color:#555}
button{cursor:pointer;font-family:inherit;background:none;border:none;color:inherit}
.card{background:#111;border:.5px solid #2a2a2a;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.lbl{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.sect{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.mono{font-family:monospace}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.b-green{background:#0d2e1a;color:#4ade80;border:.5px solid #166534}
.b-red{background:#2e0d0d;color:#f87171;border:.5px solid #7f1d1d}
.b-yellow{background:#1c1400;color:#fbbf24;border:.5px solid #78350f}
.b-blue{background:#0d1a2e;color:#60a5fa;border:.5px solid #1e3a5f}
.tab{padding:7px 16px;font-size:12px;border:.5px solid #1e1e1e;border-radius:8px;color:#555;background:transparent;letter-spacing:.03em}
.tab.active{background:#1a1a1a;color:#e2e2e2;border-color:#3a3a3a;font-weight:500}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid #1a1a1a;font-size:13px;align-items:center}
.row .k{color:#888}
.row .v{font-family:monospace;font-weight:500}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
canvas{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div style="margin-bottom:1.5rem;border-bottom:.5px solid #1e1e1e;padding-bottom:1rem">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap">
      <span style="font-size:22px;font-weight:500;color:#fff">Lajes treliçadas</span>
      <span class="badge b-blue">NBR 6118</span>
      <span class="badge b-blue">NBR 6120</span>
    </div>
    <div style="font-size:13px;color:#555">ELU · ELS Branson · Cisalhamento · Comparador de combinações</div>
  </div>

  <div class="grid2" style="margin-bottom:1.2rem">
    <div class="card">
      <div class="sect">Geometria</div>
      <div style="margin-bottom:12px">
        <label class="lbl">Vão Lx (m)</label>
        <input type="number" step="0.1" min="1" max="12" id="lx" value="4.2" style="font-family:monospace;font-size:18px;font-weight:500"/>
      </div>
      <div>
        <label class="lbl">Capa hf</label>
        <select id="hf"><option value="4">4 cm</option><option value="5" selected>5 cm</option><option value="6">6 cm</option><option value="7">7 cm</option></select>
      </div>
    </div>
    <div class="card">
      <div class="sect">Carregamento (kg/m²)</div>
      <div style="margin-bottom:10px">
        <label class="lbl">Destinação</label>
        <select id="preset"></select>
      </div>
      <div class="grid2">
        <div><label class="lbl">gk perm.</label><input type="number" id="gk" value="180" style="font-family:monospace"/></div>
        <div><label class="lbl">qk acidental</label><input type="number" id="qk" value="150" style="font-family:monospace"/></div>
      </div>
    </div>
  </div>

  <div class="grid4" id="metrics" style="margin-bottom:1.2rem"></div>
  <div id="tabbar" style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap"></div>
  <div class="card" id="panel"></div>

  <div style="margin-top:16px;font-size:11px;color:#333;text-align:center">NBR 6118:2014 · NBR 6120:2019 · Prof. Dr. Alexandre Moura</div>
</div>

<script>
"use strict";

var PRESETS={
  cobertura:{name:"Cobertura (sem acesso)",gk:150,qk:50},
  residencial:{name:"Residencial (dormitórios/salas)",gk:180,qk:150},
  escritorio:{name:"Escritórios / Comercial",gk:200,qk:250},
  corredor:{name:"Corredores e escadas",gk:190,qk:250},
  garagem:{name:"Garagem (veículos leves)",gk:180,qk:300},
  terraco:{name:"Terraços e sacadas",gk:220,qk:300},
  clinica:{name:"Clínicas e consultórios",gk:230,qk:300},
  custom:{name:"Personalizado",gk:0,qk:0}
};
var VIGOTA_DATA={8:{as_t:0.66,bw:12},12:{as_t:0.99,bw:14},16:{as_t:1.27,bw:14},20:{as_t:1.57,bw:16},25:{as_t:1.96,bw:16},30:{as_t:2.45,bw:16}};
var HEIGHTS=[8,12,16,20,25,30];
var PHI_BARS=[{phi:5.0,area:0.196},{phi:6.3,area:0.312},{phi:8.0,area:0.503},{phi:10.0,area:0.785},{phi:12.5,area:1.227},{phi:16.0,area:2.011},{phi:20.0,area:3.142}];
var EXTRA_OPTIONS=[
  {label:"sem reforço",area:0},{label:"1× ø6,3",area:0.312},{label:"2× ø6,3",area:0.624},
  {label:"1× ø8,0",area:0.503},{label:"2× ø8,0",area:1.006},{label:"1× ø10,0",area:0.785},
  {label:"2× ø10,0",area:1.570},{label:"2× ø12,5",area:2.454}
];
var FCK=25,FCD=(FCK/10)/1.4,FYD=50/1.15,BF=42;

function rebarSpec(a){
  if(a<=0)return"Treliça suficiente";
  if(a<=0.392)return"2× ø5,0 mm";if(a<=0.624)return"2× ø6,3 mm";if(a<=1.006)return"2× ø8,0 mm";
  if(a<=1.570)return"2× ø10,0 mm";if(a<=2.454)return"2× ø12,5 mm";return"3+ barras — revisar";
}
function branson(Ic,III,Mr,Ma){if(Ma<=Mr)return Ic;var r=Mr/Ma;return Ic*r*r*r+III*(1-r*r*r);}
function calcInertia(bf,hf,bw,h_tot,d,as_tot){
  var Es=21000,Ec=5600*Math.sqrt(25),ae=Es/Ec;
  var Af=bf*hf,yf=hf/2,Aw=bw*(h_tot-hf),yw=hf+(h_tot-hf)/2,A=Af+Aw,yg=(Af*yf+Aw*yw)/A;
  var Ic=(bf*Math.pow(hf,3)/12+Af*Math.pow(yg-yf,2))+(bw*Math.pow(h_tot-hf,3)/12+Aw*Math.pow(yw-yg,2));
  var alpha=ae*as_tot,a2=bw/2,b2=bf*hf+alpha,c2=-(bf*hf*hf/2+alpha*d);
  var disc=b2*b2-4*a2*c2,x2=(-b2+Math.sqrt(disc))/(2*a2);
  var III=(bf>bw&&x2>hf)?(bf*hf*hf*hf/12+bf*hf*Math.pow(x2-hf/2,2))+(bw*Math.pow(x2-hf,3)/3)+ae*as_tot*Math.pow(d-x2,2):(bf*x2*x2*x2/3)+ae*as_tot*Math.pow(d-x2,2);
  return{Ic:Ic,III:III};
}
function calcDeflection(q,span,Ieq){var Ec=5600*Math.sqrt(25)*10,L=span*100;return(5*(q/100)*Math.pow(L,4))/(384*Ec*Ieq)*25;}

function runChecks(h,hf,bf,span,msd,ma,qd,asExtra){
  asExtra=asExtra||0;
  var h_tot=h+hf,cov=2.5,d=h_tot-cov,bw=VIGOTA_DATA[h].bw,hmin=(span*100)/20,below=h_tot<hmin;
  var rt=d*d-(2*msd)/(0.85*FCD*bf);
  if(rt<0)return{fail:"Esmagamento do concreto",stage:"ELU",belowPreDim:below,hmin:hmin};
  var x=(d-Math.sqrt(rt))/0.8,xd=x/d;
  if(xd>0.45)return{fail:"x/d = "+xd.toFixed(3)+" > 0,45 (frágil)",stage:"ELU-D",belowPreDim:below,hmin:hmin,xd:xd.toFixed(3)};
  var as_tot=msd/(FYD*(d-0.4*x)),as_min=0.0015*bw*h_tot,as_str=Math.max(as_tot,as_min),as_pl=as_str+asExtra,as_comp=Math.max(0,as_pl-VIGOTA_DATA[h].as_t);
  var vsd=qd*span/2,tau=0.25*Math.pow(25,1/3)/10,rho=Math.min(as_pl/(bw*d),0.02),k=Math.min(1+Math.sqrt(20/d),2),vrd1=tau*k*(1.2+40*rho)*bw*d;
  if(vsd>vrd1)return{fail:"Vsd="+vsd.toFixed(1)+" > Vrd1="+vrd1.toFixed(1)+" kN",stage:"ELU-V",belowPreDim:below,hmin:hmin};
  var I=calcInertia(bf,hf,bw,h_tot,d,as_pl),fctm=0.3*Math.pow(25,2/3)/10,Mr=fctm*I.Ic/(h_tot-d+cov),Ieq=branson(I.Ic,I.III,Mr,ma),delta=calcDeflection(qd,span,Ieq),lim=(span*100)/250;
  if(delta>lim)return{fail:"δ="+delta.toFixed(2)+" > L/250="+lim.toFixed(2)+" cm",stage:"ELS-F",belowPreDim:below,hmin:hmin,delta:delta.toFixed(2)};
  var as_neg=Math.max(0.90,0.0015*bf*hf);
  return{pass:true,h:h,h_tot:h_tot,hf:hf,d:d,x:x.toFixed(2),xd:xd.toFixed(3),as_tot:as_tot.toFixed(2),as_min:as_min.toFixed(2),
    as_used:as_str.toFixed(2),as_placed:as_pl.toFixed(2),as_comp:as_comp.toFixed(2),rebar:rebarSpec(as_comp),
    vsd:vsd.toFixed(2),vrd1:vrd1.toFixed(2),Ic:I.Ic.toFixed(0),III:I.III.toFixed(0),Ieq:Ieq.toFixed(0),
    Mr:Mr.toFixed(1),Ma:ma.toFixed(1),delta:delta.toFixed(2),lim250:lim.toFixed(2),as_neg:as_neg.toFixed(2),asExtra:asExtra,belowPreDim:below,hmin:hmin};
}
function minReinforcement(h,hf,bf,span,msd,ma,qd){
  for(var i=0;i<EXTRA_OPTIONS.length;i++){var r=runChecks(h,hf,bf,span,msd,ma,qd,EXTRA_OPTIONS[i].area);if(r.pass){r.extraOption=EXTRA_OPTIONS[i];return r;}}
  var f=runChecks(h,hf,bf,span,msd,ma,qd,0);f.extraOption=null;f.inviavel=true;return f;
}

var state={tab:"veredito",phiNeg:6.3,results:null,chart:null};

function compute(){
  var span=parseFloat(document.getElementById("lx").value)||0;
  var hf=parseInt(document.getElementById("hf").value);
  var gk=parseFloat(document.getElementById("gk").value)||0;
  var qk=parseFloat(document.getElementById("qk").value)||0;
  if(span<=0){state.results=null;render();return;}
  var pk=gk+qk,pd=pk*1.4/100,qd=pd*(BF/100),msd=(qd*span*span/8)*100,ma=((pk/100)*(BF/100)*span*span/8)*100,msdkn=msd/100;
  var meta={qd:qd.toFixed(2),msd:msdkn.toFixed(2),pk:pk,pd_kg:(pd*100).toFixed(0),span:span,hf:hf,gk:gk,qk:qk};
  var analysis=HEIGHTS.map(function(h){
    var r=minReinforcement(h,hf,BF,span,msd,ma,qd);
    r.verdict=r.inviavel?"inviavel":(r.belowPreDim?"economica":"recomendada");
    r.h=h;return r;
  });
  var rec=analysis.filter(function(a){return a.verdict==="recomendada";});
  var chosen=rec.length?rec[0]:(analysis.filter(function(a){return !a.inviavel;})[0]||null);
  var eco=analysis.filter(function(a){return a.verdict==="economica"&&(!chosen||a.h<chosen.h);});
  state.results={chosen:chosen,analysis:analysis,economicas:eco,meta:meta};
  render();
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function rowHtml(k,v,ok){var col=ok===true?"#4ade80":ok===false?"#f87171":"#c9c9c9";return '<div class="row"><span class="k">'+k+'</span><span class="v" style="color:'+col+'">'+v+'</span></div>';}
function metricCard(l,v,u,c){return '<div class="card" style="margin:0;border-color:'+(c?c+"44":"#222")+'"><div style="font-size:11px;color:#555;margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase">'+l+'</div><div class="mono" style="font-size:20px;font-weight:500;color:'+(c||"#e2e2e2")+'">'+v+' <span style="font-size:12px;color:#555;font-family:system-ui">'+u+'</span></div></div>';}
function badge(v){if(v==="recomendada")return '<span class="badge b-green">✓ Recomendada</span>';if(v==="economica")return '<span class="badge b-yellow">💡 Econômica</span>';return '<span class="badge b-red">✗ Inviável</span>';}

function vereditoCols(d){
  var elu='<div class="sect">ELU — Resistência</div>'+
    rowHtml("Linha neutra x",parseFloat(d.x).toFixed(2)+" cm")+
    rowHtml("Altura útil d",d.d.toFixed(1)+" cm")+
    rowHtml("x / d",d.xd,parseFloat(d.xd)<=0.45)+
    rowHtml("Ductilidade",parseFloat(d.xd)<=0.45?"Zona dúctil ✓":"Frágil ✗",parseFloat(d.xd)<=0.45)+
    rowHtml("Vsd",d.vsd+" kN")+rowHtml("Vrd1",d.vrd1+" kN")+
    rowHtml("Cisalhamento",parseFloat(d.vsd)<=parseFloat(d.vrd1)?"Aprovado ✓":"Falha ✗",parseFloat(d.vsd)<=parseFloat(d.vrd1));
  var els='<div class="sect">ELS — Deformação (Branson)</div>'+
    rowHtml("Ic (íntegra)",parseInt(d.Ic).toLocaleString()+" cm⁴")+
    rowHtml("III (fissurada)",parseInt(d.III).toLocaleString()+" cm⁴")+
    rowHtml("Ieq (Branson)",parseInt(d.Ieq).toLocaleString()+" cm⁴")+
    rowHtml("Momento Mr",d.Mr+" kN·cm")+rowHtml("Momento Ma",d.Ma+" kN·cm")+
    rowHtml("Flecha δ×2,5",d.delta+" cm",parseFloat(d.delta)<=parseFloat(d.lim250))+
    rowHtml("Limite L/250",d.lim250+" cm",parseFloat(d.delta)<=parseFloat(d.lim250));
  return '<div class="grid2" style="gap:16px"><div>'+elu+'</div><div>'+els+'</div></div>';
}

function render(){
  var R=state.results;
  // métricas
  var m=document.getElementById("metrics");
  if(R){m.innerHTML=metricCard("Carga serviço",R.meta.pk,"kg/m²")+metricCard("Carga projeto",R.meta.pd_kg,"kg/m²","#f87171")+metricCard("Carga linear",R.meta.qd,"kN/m","#60a5fa")+metricCard("Msd",R.meta.msd,"kNm","#4ade80");}else{m.innerHTML="";}
  // tabs
  var c=R?R.chosen:null,eco=R?R.economicas:[];
  var tabs=[["veredito","Veredito"],["alternativa",eco.length?"💡 Alternativas ("+eco.length+")":"Comparar opções"],["memorial","Memorial"],["armaduras","Armaduras"],["branson","Branson / ELS"],["log","Log"]];
  var tb=document.getElementById("tabbar");tb.innerHTML="";
  tabs.forEach(function(t){var b=document.createElement("button");b.className="tab"+(state.tab===t[0]?" active":"");b.textContent=t[1];b.onclick=function(){state.tab=t[0];render();};tb.appendChild(b);});
  // painel
  var p=document.getElementById("panel"),html="";
  if(!R){p.innerHTML='<div style="color:#555;text-align:center;padding:2rem">Ajuste os parâmetros.</div>';return;}

  if(state.tab==="veredito"){
    if(c&&c.pass){
      html='<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:14px 16px;background:#0d2e1a;border:.5px solid #166534;border-radius:10px"><span style="font-size:36px">✅</span><div><div class="mono" style="font-size:26px;font-weight:500;color:#4ade80">H'+c.h+' recomendada</div><div style="font-size:13px;color:#22c55e">Altura total '+c.h_tot+' cm · Capa '+R.meta.hf+' cm · respeita L/20 = '+c.hmin.toFixed(1)+' cm</div></div></div>';
      if(eco.length)html+='<div style="margin-bottom:16px;padding:12px 14px;background:#1c1400;border:.5px solid #78350f;border-radius:10px;font-size:13px;color:#fbbf24">💡 Existem '+eco.length+' alternativa(s) mais baixa(s) que atendem em verificação — veja a aba Alternativas.</div>';
      html+=vereditoCols(c);
    }else{
      html='<div style="text-align:center;padding:2rem"><div style="font-size:48px;margin-bottom:12px">⚠️</div><div style="font-size:18px;font-weight:500;color:#f87171;margin-bottom:8px">Nenhuma vigota padrão atende</div><div style="font-size:13px;color:#888">Vão excessivo: considere vigas secundárias, laje maciça ou protendida.</div></div>';
    }
  }
  else if(state.tab==="alternativa"){
    html='<div class="sect" style="margin-bottom:6px">Comparador de combinações (vigota × reforço)</div>';
    html+='<div style="font-size:12px;color:#666;margin-bottom:16px;line-height:1.6">Cada linha mostra o reforço mínimo para passar em todos os estados limite. <span style="color:#fbbf24">Econômica</span> = passa porém abaixo do pré-dim L/20 (verificar conforto). O reforço aumenta a inércia fissurada (reduz flecha) e o cisalhamento, mas <strong>não corrige x/d</strong> — para isso só aumentando a altura.</div>';
    R.analysis.forEach(function(a){
      var isCh=c&&a.h===c.h&&a.verdict==="recomendada";
      var bg=a.verdict==="recomendada"?"#0d2e1a":a.verdict==="economica"?"#1c1400":"#1a0d0d";
      var bd=a.verdict==="recomendada"?"#166534":a.verdict==="economica"?"#78350f":"#5a1a1a";
      html+='<div style="background:'+bg+';border:.5px solid '+bd+';border-radius:10px;padding:12px 14px;margin-bottom:8px">';
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:'+(a.inviavel?0:8)+'px;flex-wrap:wrap"><span class="mono" style="font-size:18px;font-weight:500;color:#fff;min-width:42px">H'+a.h+'</span><span style="font-size:12px;color:#888">'+a.h_tot+' cm total</span>'+badge(a.verdict)+(isCh?'<span class="badge b-green">★ Escolhida</span>':'')+(a.verdict==="economica"?'<span style="font-size:11px;color:#d97706">−'+(c?c.h_tot-a.h_tot:0)+' cm vs recomendada</span>':'')+'</div>';
      if(a.inviavel){html+='<div style="font-size:12px;color:#f87171">Não atende nem com reforço máximo: '+esc(a.fail)+'</div>';}
      else{
        function cell(l,v,col){return '<div><div style="color:#555;font-size:10px;text-transform:uppercase">'+l+'</div><div class="mono" style="color:'+(col||"#c9c9c9")+';font-weight:500">'+v+'</div></div>';}
        html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px">'+
          cell("Reforço mín.",a.extraOption?a.extraOption.label:"—",a.extraOption&&a.extraOption.area>0?"#fbbf24":"#4ade80")+
          cell("x / d",a.xd)+cell("Flecha δ",a.delta+" cm")+cell("Lim L/250",a.lim250+" cm")+'</div>';
      }
      html+='</div>';
    });
    html+='<div style="margin-top:14px;font-size:12px;color:#555;background:#0a0a0a;border-radius:8px;padding:10px 14px;line-height:1.6"><strong style="color:#888">Como ler:</strong> a <span style="color:#4ade80">recomendada</span> é a menor altura que respeita o pré-dim. As <span style="color:#fbbf24">econômicas</span> economizam concreto ao custo de reforço e verificação de serviço mais rigorosa — útil para apresentar opções de custo ao cliente.</div>';
  }
  else if(state.tab==="memorial"){
    var d=c;
    if(d&&d.pass){
      var blocks=[
        ["1. Cargas",["pk = "+R.meta.gk+" + "+R.meta.qk+" = "+R.meta.pk+" kg/m²","pd = "+R.meta.pk+" × 1,4 = "+R.meta.pd_kg+" kg/m² = "+(R.meta.pd_kg/100).toFixed(2)+" kN/m²","qd = "+(R.meta.pd_kg/100).toFixed(2)+" × 0,42 = "+d.qd+" kN/m"]],
        ["2. Esforços",["Msd = qd × Lx² / 8 = "+d.qd+" × "+R.meta.span+"² / 8 = "+d.msd+" kN·m = "+(parseFloat(d.msd)*100).toFixed(0)+" kN·cm","Vsd = qd × Lx / 2 = "+d.vsd+" kN"]],
        ["3. Seção T equivalente",["h_tot = "+d.h+" + "+R.meta.hf+" = "+d.h_tot+" cm","bf = 42 cm   bw = "+VIGOTA_DATA[d.h].bw+" cm   d = "+d.d.toFixed(1)+" cm","Pré-dim: h_tot "+(d.belowPreDim?"<":"≥")+" L/20 = "+d.hmin.toFixed(1)+" cm"]],
        ["4. ELU — Ductilidade e aço",["fcd = 25/(10×1,4) = "+FCD.toFixed(3)+" kN/cm²   fyd = 50/1,15 = "+FYD.toFixed(2)+" kN/cm²","x = [d − √(d² − 2Msd/(0,85·fcd·bf))]/0,8 = "+parseFloat(d.x).toFixed(2)+" cm","x/d = "+d.xd+" ≤ 0,45 → "+(parseFloat(d.xd)<=0.45?"dúctil ✓":"frágil ✗"),"As,resistência = max(As,tot;As,min) = "+d.as_used+" cm²","As,colocado = "+d.as_used+" + "+d.asExtra.toFixed(3)+" = "+d.as_placed+" cm²","As,comp (além treliça "+VIGOTA_DATA[d.h].as_t+") = "+d.as_comp+" cm² → "+d.rebar]],
        ["5. ELU — Cisalhamento",["τRd = 0,25 × 25^(1/3)/10 = "+(0.25*Math.pow(25,1/3)/10).toFixed(4)+" kN/cm²","ρ1 = As,colocado/(bw×d) = "+(parseFloat(d.as_placed)/(VIGOTA_DATA[d.h].bw*d.d)).toFixed(5),"k = min(1+√(20/d);2) = "+Math.min(1+Math.sqrt(20/d.d),2).toFixed(3),"Vrd1 = τRd×k×(1,2+40ρ1)×bw×d = "+d.vrd1+" kN","Vsd = "+d.vsd+" kN ≤ Vrd1 = "+d.vrd1+" kN → "+(parseFloat(d.vsd)<=parseFloat(d.vrd1)?"✓":"✗")]],
        ["6. ELS — Branson e flecha",["Ic = "+parseInt(d.Ic).toLocaleString()+" cm⁴   III = "+parseInt(d.III).toLocaleString()+" cm⁴","Mr = "+d.Mr+" kN·cm   Ma = "+d.Ma+" kN·cm","Ieq = Ic×(Mr/Ma)³+III×[1−(Mr/Ma)³] = "+parseInt(d.Ieq).toLocaleString()+" cm⁴","δ = 5qL⁴/(384EcIeq)×2,5 = "+d.delta+" cm","L/250 = "+d.lim250+" cm → "+(parseFloat(d.delta)<=parseFloat(d.lim250)?"✓":"✗")]]
      ];
      html='<div style="font-weight:500;margin-bottom:16px;font-size:14px;color:#fff">Memorial — H'+d.h+(d.asExtra>0?" + "+(d.extraOption?d.extraOption.label:""):"")+' · Lx = '+R.meta.span+' m · hf = '+R.meta.hf+' cm</div>';
      blocks.forEach(function(b){
        html+='<div style="margin-bottom:18px"><div style="font-weight:500;color:#aaa;border-bottom:.5px solid #1e1e1e;padding-bottom:4px;margin-bottom:8px;font-size:11px;letter-spacing:.05em;text-transform:uppercase">'+b[0]+'</div>';
        b[1].forEach(function(l){html+='<div class="mono" style="font-size:12px;color:#666;padding-left:10px;margin-bottom:2px">'+esc(l)+'</div>';});
        html+='</div>';
      });
    }else html='<div style="color:#555">Sem resultado.</div>';
  }
  else if(state.tab==="armaduras"){
    var d=c;
    if(d&&d.pass){
      var sp=Math.min((function(){var b=PHI_BARS.filter(function(x){return x.phi===state.phiNeg;})[0];return b?Math.floor(b.area*100/parseFloat(d.as_neg)):0;})(),20);
      html='<div class="sect">Detalhamento de armaduras — H'+d.h+'</div>';
      html+='<div style="background:#0d1a2e;border:.5px solid #1e3a5f;border-radius:10px;padding:14px;margin-bottom:10px"><div style="color:#60a5fa;font-weight:500;margin-bottom:10px;font-size:13px">Armadura positiva inferior</div>'+
        rowHtml("As treliça H"+d.h,VIGOTA_DATA[d.h].as_t+" cm²")+(d.asExtra>0?rowHtml("Extra ("+(d.extraOption?d.extraOption.label:"")+")","+ "+d.asExtra.toFixed(3)+" cm²",true):"")+
        rowHtml("As resistência",d.as_used+" cm²")+rowHtml("As colocado",d.as_placed+" cm²")+rowHtml("As complementar",d.as_comp+" cm²")+
        '<div class="mono" style="margin-top:12px;font-size:16px;font-weight:500;color:'+(parseFloat(d.as_comp)<=0?"#4ade80":"#60a5fa")+'">'+d.rebar+'</div>'+
        '<div style="font-size:12px;color:#555;margin-top:4px">'+(parseFloat(d.as_comp)>0?"Inserir no fundo de cada nervura antes da concretagem":"A treliça absorve todo o esforço de tração")+'</div></div>';
      html+='<div class="card" style="margin-bottom:10px"><div style="color:#aaa;font-weight:500;margin-bottom:10px;font-size:13px">Tela de distribuição (capa)</div>'+rowHtml("As,dist mínima",d.as_neg+" cm²/m")+rowHtml("Tela de mercado","Q-92 ou Q-138")+'<div style="font-size:12px;color:#444;margin-top:8px">Sobre os inertes — controla retração e variação térmica</div></div>';
      html+='<div style="background:#1c1000;border:.5px solid #78350f;border-radius:10px;padding:14px"><div style="color:#fbbf24;font-weight:500;margin-bottom:10px;font-size:13px">Armadura negativa (apoios)</div>'+rowHtml("As,neg exigida",d.as_neg+" cm²/m")+
        '<div style="display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap"><select id="phiNegSel" style="width:auto;font-size:13px">'+PHI_BARS.map(function(b){return '<option value="'+b.phi+'"'+(b.phi===state.phiNeg?" selected":"")+'>ø '+b.phi+' mm</option>';}).join("")+'</select><div style="font-size:14px;color:#e2e2e2">Espaçamento: <strong class="mono" style="color:#fbbf24">'+sp+' cm</strong></div></div>'+
        '<div style="font-size:12px;color:#78350f;margin-top:8px">s = As,φ × 100 / As,neg · Trava: s ≤ 20 cm</div></div>';
    }else html='<div style="color:#555">Sem resultado.</div>';
  }
  else if(state.tab==="branson"){
    var d=c;
    if(d&&d.pass){
      html='<div class="sect">Perda de rigidez — Equação de Branson</div>';
      var cards=[["Ic (íntegra)",parseInt(d.Ic).toLocaleString(),"#3b82f6"],["Ieq (Branson)",parseInt(d.Ieq).toLocaleString(),"#4ade80"],["III (fissurada)",parseInt(d.III).toLocaleString(),"#f87171"]];
      html+='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">'+cards.map(function(x){return '<div style="background:#0a0a0a;border:.5px solid '+x[2]+'33;border-radius:8px;padding:10px 14px;flex:1;min-width:100px"><div style="font-size:11px;color:#555">'+x[0]+'</div><div class="mono" style="font-size:17px;font-weight:500;color:'+x[2]+';margin-top:2px">'+x[1]+' cm⁴</div></div>';}).join("")+'</div>';
      html+='<div style="position:relative;height:240px;background:#0a0a0a;border-radius:8px;padding:12px"><canvas id="bchart"></canvas></div>';
      html+='<div style="margin-top:12px;font-size:13px;color:#555;background:#0a0a0a;border-radius:8px;padding:10px 14px">Ma/Mr = '+(parseFloat(d.Ma)/parseFloat(d.Mr)).toFixed(2)+' · '+(parseFloat(d.Ma)<=parseFloat(d.Mr)?"Seção não fissurada (Estádio I)":"Perda de rigidez "+(100*(1-parseFloat(d.Ieq)/parseFloat(d.Ic))).toFixed(1)+"% vs íntegra")+'</div>';
    }else html='<div style="color:#555">Sem resultado.</div>';
  }
  else if(state.tab==="log"){
    html='<div class="sect">Verificação por vigota (reforço mínimo)</div>';
    R.analysis.forEach(function(a){
      var col=a.inviavel?"#f87171":a.verdict==="economica"?"#fbbf24":"#4ade80";
      html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:.5px solid #1a1a1a;flex-wrap:wrap"><span class="mono" style="font-weight:500;min-width:36px;font-size:16px;color:'+col+'">H'+a.h+'</span>'+badge(a.verdict)+'<span style="font-size:13px;color:#555">'+(a.inviavel?esc(a.fail):"reforço: "+(a.extraOption?a.extraOption.label:"nenhum")+" · δ "+a.delta+" cm")+'</span></div>';
    });
  }

  p.innerHTML=html;

  // pós-render: chart e seletor de bitola
  if(state.tab==="branson"&&c&&c.pass&&window.Chart){
    var cv=document.getElementById("bchart");
    if(cv){
      if(state.chart)state.chart.destroy();
      var steps=30,mr=parseFloat(c.Mr),ic=parseFloat(c.Ic),iii=parseFloat(c.III),labels=[],ieqD=[],icD=[],iiiD=[];
      for(var i=0;i<=steps;i++){var maa=mr*(i/steps)*2.2;labels.push((maa/mr).toFixed(2));icD.push(ic);iiiD.push(iii);ieqD.push(branson(ic,iii,mr,maa));}
      state.chart=new Chart(cv,{type:"line",data:{labels:labels,datasets:[
        {label:"Ic",data:icD,borderColor:"#3b82f6",borderDash:[6,3],borderWidth:2,pointRadius:0},
        {label:"Ieq",data:ieqD,borderColor:"#4ade80",borderWidth:2.5,pointRadius:0},
        {label:"III",data:iiiD,borderColor:"#f87171",borderDash:[3,3],borderWidth:2,pointRadius:0}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:"#1e1e1e"},ticks:{color:"#555",maxTicksLimit:8},title:{display:true,text:"Ma / Mr",color:"#444"}},y:{grid:{color:"#1e1e1e"},ticks:{color:"#555"},title:{display:true,text:"Inércia (cm⁴)",color:"#444"}}}}});
    }
  }
  var ps=document.getElementById("phiNegSel");
  if(ps)ps.onchange=function(){state.phiNeg=parseFloat(this.value);render();};
}

// init
(function(){
  var ps=document.getElementById("preset");
  Object.keys(PRESETS).forEach(function(k){var o=document.createElement("option");o.value=k;o.textContent=PRESETS[k].name;if(k==="residencial")o.selected=true;ps.appendChild(o);});
  ps.onchange=function(){var v=this.value;if(v!=="custom"){document.getElementById("gk").value=PRESETS[v].gk;document.getElementById("qk").value=PRESETS[v].qk;}compute();};
  ["lx","hf","gk","qk"].forEach(function(id){
    var el=document.getElementById(id);
    el.addEventListener("input",function(){if(id==="gk"||id==="qk")document.getElementById("preset").value="custom";compute();});
    el.addEventListener("change",compute);
  });
  compute();
})();
</script>
</body>
</html>
